name: CI

on:
  push:
    tags: ['v*']

jobs:
  # ── Go unit tests (fast, runs on all platforms) ──
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Run tests
        run: go test -short ./pkg/...

  # ── GUI build: Windows amd64 ──
  gui-windows:
    runs-on: windows-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Copy app icons
        shell: bash
        run: |
          mkdir -p cmd/gui/build/windows
          cp assets/appicon.png  cmd/gui/build/appicon.png
          cp assets/favicon.ico  cmd/gui/build/windows/icon.ico
      - name: Set version in wails.json
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i.bak "s/\"productVersion\": \"0.0.0\"/\"productVersion\": \"${VER}\"/" cmd/gui/wails.json && rm -f cmd/gui/wails.json.bak
      - name: Build GUI
        shell: bash
        working-directory: cmd/gui
        run: wails build -ldflags "$LDFLAGS"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows-amd64
          path: cmd/gui/build/bin/CefTopApp.exe

  # ── GUI build: Windows ARM64 ──
  # Uses the windows-11-arm hosted runner (native ARM64) so Wails' WebView2
  # binding compiles against the right toolchain. windows-latest cannot
  # cross-build the webview shim cleanly.
  gui-windows-arm64:
    runs-on: windows-11-arm
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Copy app icons
        shell: bash
        run: |
          mkdir -p cmd/gui/build/windows
          cp assets/appicon.png  cmd/gui/build/appicon.png
          cp assets/favicon.ico  cmd/gui/build/windows/icon.ico
      - name: Set version in wails.json
        shell: bash
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i.bak "s/\"productVersion\": \"0.0.0\"/\"productVersion\": \"${VER}\"/" cmd/gui/wails.json && rm -f cmd/gui/wails.json.bak
      - name: Build GUI
        shell: bash
        working-directory: cmd/gui
        run: wails build -ldflags "$LDFLAGS"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows-arm64
          path: cmd/gui/build/bin/CefTopApp.exe

  # ── GUI build: macOS arm64 ──
  gui-macos-arm64:
    runs-on: macos-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Copy app icons
        run: |
          mkdir -p cmd/gui/build
          cp assets/appicon.png cmd/gui/build/appicon.png
      - name: Set version in wails.json
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i.bak "s/\"productVersion\": \"0.0.0\"/\"productVersion\": \"${VER}\"/" cmd/gui/wails.json && rm -f cmd/gui/wails.json.bak
      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -ldflags "$LDFLAGS"
      - name: Zip macOS app bundle
        run: cd cmd/gui/build/bin && zip -r ceftop-macos-arm64.zip CefTopApp.app
      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos-arm64
          path: cmd/gui/build/bin/ceftop-macos-arm64.zip

  # ── GUI build: macOS amd64 ──
  gui-macos-amd64:
    runs-on: macos-latest
    needs: test
    env:
      GOARCH: amd64
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
        env:
          GOARCH: arm64
      - name: Copy app icons
        run: |
          mkdir -p cmd/gui/build
          cp assets/appicon.png cmd/gui/build/appicon.png
      - name: Set version in wails.json
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i.bak "s/\"productVersion\": \"0.0.0\"/\"productVersion\": \"${VER}\"/" cmd/gui/wails.json && rm -f cmd/gui/wails.json.bak
      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -platform darwin/amd64 -ldflags "$LDFLAGS"
      - name: Zip macOS app bundle
        run: cd cmd/gui/build/bin && zip -r ceftop-macos-amd64.zip CefTopApp.app
      - uses: actions/upload-artifact@v4
        with:
          name: gui-macos-amd64
          path: cmd/gui/build/bin/ceftop-macos-amd64.zip

  # ── GUI build: Linux amd64 ──
  gui-linux:
    runs-on: ubuntu-latest
    needs: test
    env:
      LDFLAGS: >-
        -X main.version=${{ github.ref_name }}
        -X main.commit=${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
      - name: Copy app icons
        run: |
          mkdir -p cmd/gui/build
          cp assets/appicon.png cmd/gui/build/appicon.png
      - name: Set version in wails.json
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"
          sed -i.bak "s/\"productVersion\": \"0.0.0\"/\"productVersion\": \"${VER}\"/" cmd/gui/wails.json && rm -f cmd/gui/wails.json.bak
      - name: Build GUI
        working-directory: cmd/gui
        run: wails build -tags webkit2_41 -ldflags "$LDFLAGS"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: cmd/gui/build/bin/CefTopApp

  # ── GitHub Release with all per-platform zips ──
  release:
    runs-on: ubuntu-latest
    needs: [gui-windows, gui-windows-arm64, gui-macos-arm64, gui-macos-amd64, gui-linux]
    if: always() && needs.gui-windows.result == 'success' && needs.gui-macos-arm64.result == 'success' && needs.gui-macos-amd64.result == 'success' && needs.gui-linux.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release tmp-win-amd64 tmp-win-arm64 tmp-mac-arm64 tmp-mac-amd64 tmp-linux

          # Windows amd64: CefTopApp.exe → ceftop-win-amd64.zip
          cp artifacts/gui-windows-amd64/CefTopApp.exe tmp-win-amd64/CefTopApp.exe
          (cd tmp-win-amd64 && zip ../release/ceftop-win-amd64.zip *)

          # Windows arm64 (only if the windows-11-arm job succeeded; the
          # `if` on `release` does not gate this individually so we tolerate
          # a missing artifact).
          if [ -f artifacts/gui-windows-arm64/CefTopApp.exe ]; then
            cp artifacts/gui-windows-arm64/CefTopApp.exe tmp-win-arm64/CefTopApp.exe
            (cd tmp-win-arm64 && zip ../release/ceftop-win-arm64.zip *)
          fi

          # macOS arm64: CefTopApp.app → ceftop-macos-arm64.zip
          (cd tmp-mac-arm64 && unzip ../artifacts/gui-macos-arm64/ceftop-macos-arm64.zip)
          (cd tmp-mac-arm64 && zip -r ../release/ceftop-macos-arm64.zip CefTopApp.app)

          # macOS amd64: CefTopApp.app → ceftop-macos-amd64.zip
          (cd tmp-mac-amd64 && unzip ../artifacts/gui-macos-amd64/ceftop-macos-amd64.zip)
          (cd tmp-mac-amd64 && zip -r ../release/ceftop-macos-amd64.zip CefTopApp.app)

          # Linux amd64: CefTopApp → ceftop-linux-amd64.zip
          cp artifacts/gui-linux/CefTopApp tmp-linux/CefTopApp
          (cd tmp-linux && zip ../release/ceftop-linux-amd64.zip *)

      - name: Generate checksums
        run: cd release && sha256sum * > checksums.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "ceftop ${{ github.ref_name }}" \
            --generate-notes \
            release/*
